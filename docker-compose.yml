version: '3'

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5000:5000"
    container_name: backend-container

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    container_name: frontend-container

  mongo:
    image: mongo
    container_name: mongo-container
    ports:
      - "27017:27017"